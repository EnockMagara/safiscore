services:
  # ─── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Express API ────────────────────────────────────────────
  api:
    image: ghcr.io/enockmagara/safipoints-api:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/safipoints
      - NODE_ENV=production
      - PORT=5002
    depends_on:
      mongo:
        condition: service_healthy

  # ─── React Frontend ────────────────────────────────────────
  client:
    image: ghcr.io/enockmagara/safipoints-client:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - client

  # ─── Certbot (SSL) ─────────────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  mongo_data:
  certbot_www:
  certbot_certs:
