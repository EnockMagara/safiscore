# HTTP — redirect to HTTPS (after certs are obtained)
server {
    listen 80;
    server_name safipoints.com www.safipoints.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name safipoints.com www.safipoints.com;

    ssl_certificate /etc/letsencrypt/live/safipoints.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/safipoints.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Re-resolve container IPs via Docker DNS (prevents stale upstream after redeploy)
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:5002;
    set $client_upstream http://client;

    # API proxy
    location /api/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # React frontend
    location / {
        proxy_pass $client_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
